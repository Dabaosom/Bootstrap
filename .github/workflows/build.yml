name: Build Bootstrap .tipa

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Accept Xcode license
        run: sudo xcodebuild -license accept

      - name: Install theos (roothide fork + submodules)
        run: |
          export THEOS=$HOME/theos
          if [ -d "$THEOS" ] && [ -f "$THEOS/vendor/mod/roothide/package.mk" ]; then
            echo '$THEOS already has roothide scheme'
          else
            rm -rf "$THEOS"
            git clone --depth=1 https://github.com/roothide/theos.git $THEOS
            cd $THEOS && git submodule update --init --depth=1
          fi
          echo '$THEOS=$THEOS' >> $GITHUB_ENV
          echo '$THEOS/bin' >> $GITHUB_PATH

      - name: Download official Bootstrap strapfiles
        run: |
          # Get latest release info
          curl -sL https://api.github.com/repos/roothide/Bootstrap/releases/latest > /tmp/release.json
          TAG=$(node -e "console.log(JSON.parse(require('fs').readFileSync('/tmp/release.json','utf8')).tag_name)")
          echo "Latest release: $TAG"
          # Find strapfiles tarball
          ASSET_URL=$(node -e "const r=JSON.parse(require('fs').readFileSync('/tmp/release.json','utf8')); const a=r.assets.find(x=>x.name.includes('strapfiles')); console.log(a?a.browser_download_url:'');")
          echo "Downloading: $ASSET_URL"
          curl -sL "$ASSET_URL" -o bootstrap-strapfiles.tar.zst
          ls -lh bootstrap-strapfiles.tar.zst
          mkdir -p official_strapfiles
          tar -xf bootstrap-strapfiles.tar.zst -C official_strapfiles/ 2>/dev/null || (zstd -d bootstrap-strapfiles.tar.zst -o /tmp/strapfiles.tar && tar -xf /tmp/strapfiles.tar -C official_strapfiles/)
          ls official_strapfiles/

      - name: Patch resignList.plist with siriactionsd
        run: |
          # Our basebin fork has the modified resignList.plist
          # Copy it into strapfiles/.jbroot
          if [ -f basebin/resignList.plist ]; then
            echo "Using modified resignList.plist from basebin fork:"
            cat basebin/resignList.plist | head -20
            mkdir -p official_strapfiles/.jbroot
            cp basebin/resignList.plist official_strapfiles/.jbroot/
          fi

      - name: Build Bootstrap .tipa
        run: |
          export THEOS=$HOME/theos
          # Replace strapfiles with official strapfiles (which has pre-built basebin)
          rm -rf strapfiles
          cp -a official_strapfiles/.jbroot strapfiles/ 2>/dev/null
          cp -a official_strapfiles/Library strapfiles/ 2>/dev/null
          cp -a official_strapfiles/System strapfiles/ 2>/dev/null
          cp -a official_strapfiles/usr strapfiles/ 2>/dev/null
          cp -a official_strapfiles/. strapfiles/ 2>/dev/null
          ls strapfiles/

          make package

      - name: Upload .tipa
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Bootstrap.tipa
          path: packages/Bootstrap.tipa