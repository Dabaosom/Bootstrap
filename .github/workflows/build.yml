name: Build Bootstrap .tipa

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Accept Xcode license
        run: sudo xcodebuild -license accept

      - name: Install dependencies (theos + ldid)
        run: |
          # Install ldid for code signing in basebin build
          brew install ldid

          # Install theos (roothide fork + submodules)
          export THEOS=$HOME/theos
          if [ -d "$THEOS" ] && [ -f "$THEOS/vendor/mod/roothide/package.mk" ]; then
            echo '$THEOS already has roothide scheme, skipping'
          else
            rm -rf "$THEOS"
            git clone --depth=1 https://github.com/roothide/theos.git $THEOS
            cd $THEOS && git submodule update --init --depth=1
          fi
          echo '$THEOS=$THEOS' >> $GITHUB_ENV
          echo '$THEOS/bin' >> $GITHUB_PATH

      - name: Build basebin (strapfiles)
        run: |
          # Build basebin from submodule source
          cd basebin
          ./build.sh
          cd ..
          # Move built basebin into strapfiles
          rm -rf strapfiles/basebin
          cp -a basebin/.build strapfiles/basebin

      - name: Build Xcode project (xcodebuild directly)
        run: |
          export THEOS=$HOME/theos
          # Build just the Bootstrap app (without theos clean/package)
          xcodebuild -project Bootstrap.xcodeproj -scheme Bootstrap \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            -configuration Debug -arch arm64 -sdk iphoneos

      - name: Package .tipa
        id: package
        run: |
          export THEOS=$HOME/theos
          # Find the built app bundle
          BUILT_APP=
          if [ -z "$BUILT_APP" ]; then
            BUILT_APP=$(find ~/Library/Developer/Xcode/DerivedData -name "Bootstrap.app" -type d 2>/dev/null | head -1)
          fi
          echo "Built app: $BUILT_APP"
          if [ -z "$BUILT_APP" ]; then
            echo "ERROR: Bootstrap.app not found"
            ls -la .theos/
            ls ~/Library/Developer/Xcode/DerivedData/ | grep Bootstrap | head -5
            exit 1
          fi

          # Create .tipa package
          mkdir -p packages/Payload
          cp -a "$BUILT_APP" packages/Payload/
          mkdir -p packages/
          cd packages
          zip -r Bootstrap.tipa Payload/
          cd ..
          ls -la packages/Bootstrap.tipa

      - name: Upload .tipa
        if: success() && steps.package.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: Bootstrap.tipa
          path: packages/Bootstrap.tipa