name: Build Bootstrap .tipa

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download official Bootstrap.tipa and patch with siriactionsd
        run: |
          # Download official Bootstrap.tipa
          curl -sL https://github.com/roothide/Bootstrap/releases/download/2.2.1/Bootstrap.tipa -o Bootstrap.tipa
          ls -lh Bootstrap.tipa

          # Extract .tipa (it's a zip)
          mkdir -p official_app
          unzip -q Bootstrap.tipa -d official_app/
          
          echo "Original basebin contents:"
          ls -la "$PWD/official_app/Payload/Bootstrap.app/basebin/"

      - name: Patch resignList.plist with siriactionsd
        run: |
          RESIGN="$PWD/official_app/Payload/Bootstrap.app/basebin/resignList.plist"
          
          # Download our modified resignList from basebin fork
          curl -sL https://raw.githubusercontent.com/Dabaosom/Bootstrap-basebin/main/resignList.plist -o /tmp/resignList_new.plist
          
          if [ -f /tmp/resignList_new.plist ]; then
            echo "Patching resignList.plist with siriactionsd..."
            cp /tmp/resignList_new.plist "$RESIGN"
            echo "=== Verify: siriactionsd in resignList ==="
            grep -o "siriactionsd[^<]*" "$RESIGN" | head -1
            echo "Patch done!"
          else
            echo "ERROR: Failed to download resignList.plist"
            exit 1
          fi

      - name: Add siriactionsd.extra entitlements
        run: |
          ENTITLEMENTS_DIR="$PWD/official_app/Payload/Bootstrap.app/basebin/entitlements/executables"
          
          # Download siriactionsd.extra from basebin fork
          curl -sL https://raw.githubusercontent.com/Dabaosom/Bootstrap-basebin/main/entitlements/executables/siriactionsd.extra -o "$ENTITLEMENTS_DIR/siriactionsd.extra"
          
          if [ -f "$ENTITLEMENTS_DIR/siriactionsd.extra" ]; then
            echo "=== Added siriactionsd.extra ==="
            ls -la "$ENTITLEMENTS_DIR/siriactionsd.extra"
            echo ""
            echo "All executables entitlements:"
            ls "$ENTITLEMENTS_DIR/"
          else
            echo "ERROR: Failed to download siriactionsd.extra"
            exit 1
          fi

      - name: Repackage .tipa (zip method)
        run: |
          # .tipa is just a zip of Payload directory
          mkdir -p packages/
          
          # Remove old Bootstrap.tipa if exists
          rm -f packages/Bootstrap.tipa
          
          cd official_app
          zip -qr "$OLDPWD/packages/Bootstrap.tipa" Payload/
          cd "$OLDPWD"
          
          SIZE=$(stat -f%z packages/Bootstrap.tipa 2>/dev/null || stat -c%s packages/Bootstrap.tipa 2>/dev/null)
          echo "Bootstrap.tipa size: $SIZE bytes"
          ls -lh packages/Bootstrap.tipa

      - name: Upload .tipa
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Bootstrap.tipa
          path: packages/Bootstrap.tipa
