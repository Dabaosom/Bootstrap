name: Build Bootstrap .tipa

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Accept Xcode license
        run: sudo xcodebuild -license accept

      - name: Install theos (roothide fork + submodules)
        run: |
          export THEOS=$HOME/theos
          if [ -d "$THEOS" ] && [ -f "$THEOS/vendor/mod/roothide/package.mk" ]; then
            echo '$THEOS already has roothide scheme'
          else
            rm -rf "$THEOS"
            git clone --depth=1 https://github.com/roothide/theos.git $THEOS
            cd $THEOS && git submodule update --init --depth=1
          fi
          echo '$THEOS=$THEOS' >> $GITHUB_ENV
          echo '$THEOS/bin' >> $GITHUB_PATH

      - name: Download official Bootstrap release (strapfiles)
        run: |
          # Download latest official Bootstrap release to get pre-built strapfiles
          curl -sL "https://api.github.com/repos/roothide/Bootstrap/releases/latest" | grep -o '"tag_name": "[^"]*"' | cut -d'"' -f4
          ASSET_URL=$(curl -sL "https://api.github.com/repos/roothide/Bootstrap/releases/latest" | grep -o '"browser_download_url": "[^"]*"' | grep -v '.tipa' | grep -o 'https://[^"]*strapfiles[^"]*\.tar\.zst' | head -1)
          echo "Downloading: $ASSET_URL"
          curl -sL "$ASSET_URL" -o bootstrap-strapfiles.tar.zst
          echo "Size: $(du -sh bootstrap-strapfiles.tar.zst)"
          mkdir -p official_strapfiles
          tar -xf bootstrap-strapfiles.tar.zst -C official_strapfiles/ 2>/dev/null || zstd -d bootstrap-strapfiles.tar.zst -o bootstrap-strapfiles.tar && tar -xf bootstrap-strapfiles.tar -C official_strapfiles/

          # List what's in strapfiles
          ls official_strapfiles/

      - name: Build Bootstrap .tipa
        run: |
          export THEOS=$HOME/theos

          # Use official strapfiles as base, but with our resignList modification
          mkdir -p strapfiles
          cp -a official_strapfiles/.jbroot/. strapfiles/ 2>/dev/null || cp -a official_strapfiles/. strapfiles/

          # Our resignList fork's resignList.plist overrides the official one
          # The submodule basebin has our modified resignList.plist
          if [ -d basebin/resignList.plist ]; then
            echo "Using modified resignList.plist from fork..."
            mkdir -p strapfiles/.jbroot
            cp basebin/resignList.plist strapfiles/.jbroot/
          fi

          # Build with theos
          make package

      - name: Upload .tipa
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Bootstrap.tipa
          path: packages/Bootstrap.tipa