name: Build Bootstrap .tipa

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Accept Xcode license
        run: sudo xcodebuild -license accept

      - name: Download official Bootstrap.tipa and patch resignList
        run: |
          # Download official Bootstrap.tipa
          curl -sL https://github.com/roothide/Bootstrap/releases/download/2.2.1/Bootstrap.tipa -o Bootstrap.tipa
          ls -lh Bootstrap.tipa

          # Extract .tipa (it's a zip)
          mkdir -p official_app
          unzip -q Bootstrap.tipa -d official_app/
          
          # resignList.plist is at Bootstrap.app/basebin/resignList.plist
          RESIGN="$PWD/official_app/Payload/Bootstrap.app/basebin/resignList.plist"
          echo "Found resignList at: $RESIGN"
          ls -la "$PWD/official_app/Payload/Bootstrap.app/basebin/"

      - name: Patch resignList.plist with siriactionsd
        run: |
          RESIGN="$PWD/official_app/Payload/Bootstrap.app/basebin/resignList.plist"
          
          if [ -f basebin/resignList.plist ]; then
            echo "Patching with basebin/resignList.plist from fork (contains siriactionsd)..."
            cp basebin/resignList.plist "$RESIGN"
            echo "=== Verify: siriactionsd in resignList ==="
            grep -o "siriactionsd[^<]*" "$RESIGN" || grep "siriactionsd" "$RESIGN"
            echo "Patch done!"
          else
            echo "ERROR: basebin/resignList.plist not found"
            ls -la basebin/ 2>/dev/null || echo "basebin/ not found"
            exit 1
          fi

      - name: Repackage .tipa (zip method)
        run: |
          # .tipa is just a zip of Payload directory
          mkdir -p packages/
          
          # Remove old Bootstrap.tipa if exists
          rm -f packages/Bootstrap.tipa
          
          cd official_app
          zip -qr "$OLDPWD/packages/Bootstrap.tipa" Payload/
          cd "$OLDPWD"
          
          SIZE=$(stat -f%z packages/Bootstrap.tipa 2>/dev/null || stat -c%s packages/Bootstrap.tipa 2>/dev/null)
          echo "Bootstrap.tipa size: $SIZE bytes"
          ls -lh packages/Bootstrap.tipa

      - name: Upload .tipa
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Bootstrap.tipa
          path: packages/Bootstrap.tipa
