name: Build Bootstrap .tipa

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Accept Xcode license
        run: sudo xcodebuild -license accept

      - name: Install theos (roothide fork + submodules)
        run: |
          export THEOS=$HOME/theos
          if [ -d "$THEOS" ] && [ -f "$THEOS/vendor/mod/roothide/package.mk" ]; then
            echo '$THEOS already has roothide scheme'
          else
            rm -rf "$THEOS"
            git clone --depth=1 https://github.com/roothide/theos.git $THEOS
            cd $THEOS && git submodule update --init --depth=1
          fi
          echo 'THEOS=$THEOS' >> $GITHUB_ENV
          echo '$THEOS/bin' >> $GITHUB_PATH

      - name: Download official Bootstrap.tipa and patch resignList
        run: |
          export THEOS=$HOME/theos
          
          # Download official Bootstrap.tipa
          curl -sL https://github.com/roothide/Bootstrap/releases/download/2.2.1/Bootstrap.tipa -o Bootstrap.tipa
          ls -lh Bootstrap.tipa

          # Extract .tipa (it's a zip)
          mkdir -p official_app
          unzip -q Bootstrap.tipa -d official_app/
          ls official_app/
          ls official_app/Payload/Bootstrap.app/

          # Check if resignList.plist is inside the app bundle
          RESIGN="$PWD/official_app/Payload/Bootstrap.app/strapfiles/.jbroot/resignList.plist"
          if [ -f "$RESIGN" ]; then
            echo "Found resignList.plist at: $RESIGN"
            echo "Contents:"
            cat "$RESIGN"
          else
            echo "resignList.plist not found at $RESIGN"
            find official_app -name "resignList.plist" -o -name "*.plist" | head -20
          fi

      - name: Patch resignList.plist with siriactionsd
        run: |
          RESIGN="$PWD/official_app/Payload/Bootstrap.app/strapfiles/.jbroot/resignList.plist"
          if [ -f "$RESIGN" ]; then
            echo "Patching resignList.plist with siriactionsd..."
            
            # Use our modified resignList from basebin fork
            if [ -f basebin/resignList.plist ]; then
              cp basebin/resignList.plist "$RESIGN"
              echo "Patched with basebin/resignList.plist"
            else
              echo "basebin/resignList.plist not found"
              exit 1
            fi
            
            echo "Verify patched resignList:"
            cat "$RESIGN"
          else
            echo "ERROR: resignList.plist not found"
            exit 1
          fi

      - name: Repackage .tipa
        run: |
          export THEOS=$HOME/theos
          
          # Create staging directory
          THEOS_STAGING="$PWD/.theos/staging"
          mkdir -p "$THEOS_STAGING/Applications"
          
          # Copy patched app bundle to staging
          cp -a "$PWD/official_app/Payload/Bootstrap.app" "$THEOS_STAGING/Applications/"
          
          ls -la "$THEOS_STAGING/Applications/Bootstrap.app/"
          
          # Package using dm.pl
          mkdir -p packages/
          $THEOS/vendor/dm.pl/dm.pl \
            -s "$THEOS_STAGING" \
            -d "$PWD/packages/Bootstrap.tipa" \
            -o Bootstrap \
            -m 0x0150 \
            -ver 2.2.1

          # Check result
          if [ -f packages/Bootstrap.tipa ]; then
            SIZE=$(stat -f%z packages/Bootstrap.tipa 2>/dev/null || stat -c%s packages/Bootstrap.tipa 2>/dev/null)
            echo "Bootstrap.tipa size: $SIZE bytes"
          else
            echo "dm.pl failed, creating tipa with zip..."
            mkdir -p Payload
            cp -a "$THEOS_STAGING/Applications/Bootstrap.app" Payload/
            cd packages
            zip -r Bootstrap.tipa ../Payload
            rm -rf ../Payload
            cd ..
            SIZE=$(stat -f%z packages/Bootstrap.tipa 2>/dev/null || stat -c%s packages/Bootstrap.tipa 2>/dev/null)
            echo "Bootstrap.tipa (zip) size: $SIZE bytes"
          fi
          ls -lh packages/Bootstrap.tipa

      - name: Upload .tipa
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Bootstrap.tipa
          path: packages/Bootstrap.tipa
