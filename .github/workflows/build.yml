name: Build Bootstrap .tipa

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Accept Xcode license
        run: sudo xcodebuild -license accept

      - name: Install theos (roothide fork + submodules)
        run: |
          export THEOS=$HOME/theos
          if [ -d "$THEOS" ] && [ -f "$THEOS/vendor/mod/roothide/package.mk" ]; then
            echo '$THEOS already has roothide scheme'
          else
            rm -rf "$THEOS"
            git clone --depth=1 https://github.com/roothide/theos.git $THEOS
            cd $THEOS && git submodule update --init --depth=1
          fi
          echo '$THEOS=$THEOS' >> $GITHUB_ENV
          echo '$THEOS/bin' >> $GITHUB_PATH

      - name: Download official Bootstrap strapfiles
        run: |
          # Fetch release page and extract strapfiles URL
          RELEASE_HTML="$(curl -sL https://github.com/roothide/Bootstrap/releases/latest)"
          echo "$RELEASE_HTML" | grep -o 'href="[^"]*strapfiles[^"]*\.tar\.zst[^"]*"' | head -3

          # Also try the releases API
          API_RESP="$(curl -sL https://api.github.com/repos/roothide/Bootstrap/releases/latest)"
          echo "API response length: $(echo "" | wc -c)"
          echo "$API_RESP" | python3 -c "import sys,json; r=json.load(sys.stdin); [print(a['browser_download_url']) for a in r.get('assets',[]) if 'strapfiles' in a['name']]" 2>/dev/null || echo "Python parse failed"

      - name: Build Bootstrap .tipa (fallback)
        run: |
          export THEOS=$HOME/theos
          echo "Using strapfiles from submodule (basebin fork)"
          make package

      - name: Upload .tipa
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Bootstrap.tipa
          path: packages/Bootstrap.tipa