name: Build Bootstrap .tipa

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Accept Xcode license
        run: sudo xcodebuild -license accept

      - name: Install theos (roothide fork)
        run: |
          export THEOS=$HOME/theos
          if [ -d "$THEOS" ] && [ -f "$THEOS/makefiles/schemes/ros.mk" ]; then
            echo '$THEOS already has roothide scheme, skipping install'
          else
            rm -rf "$THEOS"
            git clone --depth=1 https://github.com/roothide/theos.git $THEOS
          fi
          echo '$THEOS=$THEOS' >> $GITHUB_ENV
          echo '$THEOS/bin' >> $GITHUB_PATH

      - name: Build package
        run: |
          export THEOS=$HOME/theos
          make package

      - name: Upload .tipa
        uses: actions/upload-artifact@v4
        with:
          name: Bootstrap.tipa
          path: packages/Bootstrap.tipa